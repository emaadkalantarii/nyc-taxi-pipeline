name: NYC Taxi Pipeline CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pandas pyarrow

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short

      - name: Validate dbt project structure
        run: |
          pip install dbt-core dbt-postgres
          cd dbt_project/nyc_taxi_dbt
          dbt parse --profiles-dir .

      - name: Check Python files are importable
        run: |
          python -c "import pandas; import pyarrow; print('Core dependencies OK')"

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Run linting
        run: |
          flake8 spark_jobs/ --max-line-length=120 --ignore=E501,W503,W504,W292,F401,E402 --exclude=__pycache__
          flake8 data_quality/ --max-line-length=120 --ignore=E501,W503,W504,W292,F401,E402 --exclude=__pycache__
          flake8 tests/ --max-line-length=120 --ignore=E501,W503,W504,W292,F401,E402 --exclude=__pycache__